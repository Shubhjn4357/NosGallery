name: Build Android APK (Expo + Vanilla)

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Build with Expo tools (expo prebuild → Gradle)
  # ─────────────────────────────────────────────
  build-expo:
    name: Build APK via Expo Prebuild
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          accept-android-sdk-licenses: true

      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v4

      - name: Install Node Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Validate TypeScript
        run: pnpm exec tsc --noEmit
        continue-on-error: true

      - name: Validate Widget Registry
        run: node scripts/validate_widgets.js
        continue-on-error: true

      - name: Expo Prebuild (Android)
        run: pnpm exec expo prebuild --platform android --no-install
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Build Debug APK (Expo path)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m"

      - name: Upload Expo APK
        uses: actions/upload-artifact@v4
        with:
          name: nos-gallery-expo-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  # ─────────────────────────────────────────────
  # JOB 2: Build without Expo tools (pure Gradle on pre-generated native folder)
  # ─────────────────────────────────────────────
  build-vanilla:
    name: Build APK via Vanilla Gradle (no Expo CLI)
    runs-on: ubuntu-latest
    # This job only runs if the android/ folder is already committed to the repo
    # If it's gitignored, this job is skipped automatically
    if: ${{ hashFiles('android/build.gradle') != '' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          accept-android-sdk-licenses: true

      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v4

      - name: Install Node Dependencies (for Metro bundle)
        run: pnpm install --no-frozen-lockfile

      - name: Bundle JS (Metro — no Expo CLI)
        run: |
          mkdir -p android/app/src/main/assets
          pnpm exec react-native bundle \
            --platform android \
            --dev false \
            --entry-file src/app/index.tsx \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res/

      - name: Build Debug APK (Vanilla Gradle)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m"

      - name: Upload Vanilla APK
        uses: actions/upload-artifact@v4
        with:
          name: nos-gallery-vanilla-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn

  # ─────────────────────────────────────────────
  # JOB 3: GitHub Release (only on tags, both APKs)
  # ─────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-expo]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download Expo APK
        uses: actions/download-artifact@v4
        with:
          name: nos-gallery-expo-debug.apk
          path: ./release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/app-debug.apk
          name: NOS Gallery ${{ github.ref_name }}
          body: |
            ## 📱 NOS Gallery Studio — Release ${{ github.ref_name }}

            ### What's included
            - Live widget customization with 550+ widget templates
            - Real-time weather (Open-Meteo), crypto prices (CoinGecko), GitHub stats
            - Themes: Nothing OS, AMOLED Neon, Cyberpunk, Glassmorphism, Luxury Obsidian
            - Haptic + sound feedback, wallpaper picker, preset library

            ### Download
            | Build | Toolchain | File |
            |-------|-----------|------|
            | Debug (Expo Prebuild) | Expo → Gradle | `app-debug.apk` |

            ### Build Info
            - Node: 20 · Java: 17 · Android Target SDK: 35
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
