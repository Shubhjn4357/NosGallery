name: Build Android APK — Dev & Production

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  JAVA_VERSION: '17'
  GRADLE_OPTS: '-Dorg.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m'

# ─────────────────────────────────────────────────────────────────
# JOB 1: DEV BUILD (Debug Variant)
# ─────────────────────────────────────────────────────────────────
jobs:
  build-dev:
    name: Dev Build (Debug APK)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v4

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename Dev APK
        run: |
          mkdir -p out
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             out/nos-gallery-dev-debug.apk

      - name: Upload Dev APK
        uses: actions/upload-artifact@v4
        with:
          name: nos-gallery-dev-debug.apk
          path: out/nos-gallery-dev-debug.apk
          if-no-files-found: error
          retention-days: 14

# ─────────────────────────────────────────────────────────────────
# JOB 2: PRODUCTION BUILD (Release Variant)
# ─────────────────────────────────────────────────────────────────
  build-prod:
    name: Production Build (Release APK)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v4

      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Rename Production APK
        run: |
          mkdir -p out
          cp android/app/build/outputs/apk/release/app-release-unsigned.apk \
             out/nos-gallery-prod-unsigned.apk 2>/dev/null || \
          cp android/app/build/outputs/apk/release/app-release.apk \
             out/nos-gallery-prod-unsigned.apk 2>/dev/null || \
          cp android/app/build/outputs/apk/release/*.apk \
             out/nos-gallery-prod-unsigned.apk

      - name: Upload Production APK
        uses: actions/upload-artifact@v4
        with:
          name: nos-gallery-prod-unsigned.apk
          path: out/nos-gallery-prod-unsigned.apk
          if-no-files-found: error
          retention-days: 30

# ─────────────────────────────────────────────────────────────────
# JOB 3: GITHUB RELEASE (on tags and push to main, both APKs attached)
# ─────────────────────────────────────────────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build-dev, build-prod]

    steps:
      - name: Download Dev APK
        uses: actions/download-artifact@v4
        with:
          name: nos-gallery-dev-debug.apk
          path: ./release

      - name: Download Production APK
        uses: actions/download-artifact@v4
        with:
          name: nos-gallery-prod-unsigned.apk
          path: ./release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || format('v2.0.0-build.{0}', github.run_number) }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
          files: |
            release/nos-gallery-dev-debug.apk
            release/nos-gallery-prod-unsigned.apk
          name: "NOS Gallery Studio ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || format('v2.0.0 (Build {0})', github.run_number) }}"
          body: |
            ## 📱 NOS Gallery Studio — ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || format('v2.0.0-build.{0}', github.run_number) }}

            > Widget customization studio for Nothing OS (Native Jetpack Compose edition)

            ### 📦 Downloads

            | APK | Description | Use When |
            |-----|-------------|----------|
            | `nos-gallery-dev-debug.apk` | **Dev Build** — native debug APK | Sandbox testing, widget layout verification |
            | `nos-gallery-prod-unsigned.apk` | **Production Build** — unsigned release APK | Sideloading, final QA, distribution |

            > ⚠️ Production APK is unsigned. Sign with your keystore before publishing to Play Store.

            ### 🛠️ Build Info
            - Native Android Kotlin App
            - Jetpack Compose / Material 3
            - Target SDK 34
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
