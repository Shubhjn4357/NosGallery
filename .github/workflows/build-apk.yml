name: Build & Release Android APK

on:
  push:
    tags:
      - 'v*'
    branches:
      - main

jobs:
  build:
    name: Build Android Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          accept-android-sdk-licenses: false
          packages: ''

      - name: Accept Android SDK Licenses
        run: |
          yes | sdkmanager --licenses || true

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Validate TypeScript Typings
        run: pnpm exec tsc --noEmit

      - name: Run Widget Registry Validations
        run: node scripts/validate_widgets.js

      - name: Prebuild Expo Project
        run: pnpm exec expo prebuild --platform android --no-install

      - name: Build Android Release APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/app-release.apk
          name: Release ${{ github.ref_name }}
          body: |
            ## NOS Gallery Studio Release ${{ github.ref_name }}
            
            This is an automated build release of the NOS Gallery APK.
            
            ### Verification Logs
            - TypeScript type verification: PASSED
            - 550 Widgets registry validation: PASSED
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
