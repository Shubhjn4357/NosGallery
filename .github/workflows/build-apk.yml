name: Build Android APK — Dev & Production

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '17'
  GRADLE_OPTS: '-Dorg.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m'

# ─────────────────────────────────────────────────────────────────
# JOB 1: DEV BUILD  (expo-dev-client included, debug variant)
# ─────────────────────────────────────────────────────────────────
jobs:
  build-dev:
    name: Dev Build (expo-dev-client)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          accept-android-sdk-licenses: true

      - name: Accept Android SDK Licenses Manually
        run: |
          for cmd in sdkmanager "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "$ANDROID_HOME/cmdline-tools/20.0/bin/sdkmanager" "$ANDROID_HOME/cmdline-tools/12.0/bin/sdkmanager" "/usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager" "/usr/local/lib/android/sdk/cmdline-tools/20.0/bin/sdkmanager" "/usr/local/lib/android/sdk/tools/bin/sdkmanager"; do
            if [ -x "$cmd" ] || command -v "$cmd" &>/dev/null; then
              echo "Accepting licenses using: $cmd"
              yes | "$cmd" --licenses || true
            fi
          done

      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v4

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Clean existing android folder
        run: rm -rf android

      # expo-dev-client IS included via app.json plugins — prebuild picks it up automatically
      - name: Expo Prebuild (dev, with expo-dev-client)
        run: pnpm exec expo prebuild --platform android --no-install
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Build Debug APK (Dev)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean assembleDebug --no-daemon --stacktrace

      - name: Rename Dev APK
        run: |
          mkdir -p out
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             out/nos-gallery-dev-debug.apk

      - name: Upload Dev APK
        uses: actions/upload-artifact@v4
        with:
          name: nos-gallery-dev-debug.apk
          path: out/nos-gallery-dev-debug.apk
          if-no-files-found: error
          retention-days: 14

# ─────────────────────────────────────────────────────────────────
# JOB 2: PRODUCTION BUILD  (expo-dev-client stripped, release variant)
# ─────────────────────────────────────────────────────────────────
  build-prod:
    name: Production Build (no expo-dev-client)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          accept-android-sdk-licenses: true

      - name: Accept Android SDK Licenses Manually
        run: |
          for cmd in sdkmanager "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "$ANDROID_HOME/cmdline-tools/20.0/bin/sdkmanager" "$ANDROID_HOME/cmdline-tools/12.0/bin/sdkmanager" "/usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager" "/usr/local/lib/android/sdk/cmdline-tools/20.0/bin/sdkmanager" "/usr/local/lib/android/sdk/tools/bin/sdkmanager"; do
            if [ -x "$cmd" ] || command -v "$cmd" &>/dev/null; then
              echo "Accepting licenses using: $cmd"
              yes | "$cmd" --licenses || true
            fi
          done

      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v4

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      # Strip expo-dev-client from app.json and package.json autolinking (production only)
      - name: Strip dev-client configuration for production build
        run: node scripts/eas-pre-install.js
        env:
          EAS_BUILD_PROFILE: production

      - name: Clean existing android folder
        run: rm -rf android

      # Release builds also set NODE_ENV=production to tree-shake dev code
      - name: Expo Prebuild (production, without expo-dev-client)
        run: pnpm exec expo prebuild --platform android --no-install
        env:
          EXPO_NO_TELEMETRY: 1
          NODE_ENV: production

      - name: Build Release APK (Production, unsigned)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean assembleRelease --no-daemon --stacktrace
        env:
          NODE_ENV: production

      - name: Rename Production APK
        run: |
          mkdir -p out
          # Unsigned release APK from Gradle
          cp android/app/build/outputs/apk/release/app-release-unsigned.apk \
             out/nos-gallery-prod-unsigned.apk 2>/dev/null || \
          cp android/app/build/outputs/apk/release/app-release.apk \
             out/nos-gallery-prod-unsigned.apk 2>/dev/null || \
          cp android/app/build/outputs/apk/release/*.apk \
             out/nos-gallery-prod-unsigned.apk

      - name: Upload Production APK
        uses: actions/upload-artifact@v4
        with:
          name: nos-gallery-prod-unsigned.apk
          path: out/nos-gallery-prod-unsigned.apk
          if-no-files-found: error
          retention-days: 30

# ─────────────────────────────────────────────────────────────────
# JOB 3: GITHUB RELEASE (on tags only, both APKs attached)
# ─────────────────────────────────────────────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build-dev, build-prod]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download Dev APK
        uses: actions/download-artifact@v4
        with:
          name: nos-gallery-dev-debug.apk
          path: ./release

      - name: Download Production APK
        uses: actions/download-artifact@v4
        with:
          name: nos-gallery-prod-unsigned.apk
          path: ./release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/nos-gallery-dev-debug.apk
            release/nos-gallery-prod-unsigned.apk
          name: "NOS Gallery Studio ${{ github.ref_name }}"
          body: |
            ## 📱 NOS Gallery Studio — ${{ github.ref_name }}

            > Widget customization studio for Nothing OS, iOS & Android

            ### 📦 Downloads

            | APK | Description | Use When |
            |-----|-------------|----------|
            | `nos-gallery-dev-debug.apk` | **Dev Build** — includes expo-dev-client | Testing, fast refresh, Expo Go debugging |
            | `nos-gallery-prod-unsigned.apk` | **Production Build** — stripped, release variant | Sideloading, final QA, distribution |

            > ⚠️ Production APK is unsigned. Sign with your keystore before publishing to Play Store.

            ### 🛠️ Build Info
            - Expo SDK 56 · React Native 0.85 · Node 20 · Java 17
            - Android target SDK 35
            - expo-dev-client: **dev only** (stripped in production)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
